<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Portal — RequestHer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --mauve: #9b7fa6;
    --mauve-deep: #7a5f8a;
    --mauve-light: #f0eaf4;
    --mauve-subtle: #f7f3f9;
    --grey-border: #e5e7eb;
    --bg: #fafafa;
    --dark: #1f1f2e;
    --mid: #6b7280;
    --error: #c0392b;
    --error-bg: #fdf0ef;
    --error-border: #e8b4b0;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.1rem 6%;
    background: rgba(250,250,250,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--grey-border);
  }
  .logo { font-size: 1.2rem; font-weight: 700; color: var(--dark); letter-spacing: -0.04em; text-decoration: none; }
  .logo .q { color: var(--mauve); }
  .back-link { font-size: 0.84rem; color: var(--mid); text-decoration: none; letter-spacing: -0.01em; transition: color 0.2s; }
  .back-link:hover { color: var(--dark); }

  .portal-wrap {
    max-width: 420px;
    margin: 5rem auto 3rem;
    padding: 0 1.5rem;
  }

  .portal-card {
    background: white; border: 1px solid var(--grey-border);
    border-radius: 12px; padding: 2.5rem;
  }

  .card-tag {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--mauve); margin-bottom: 0.6rem;
  }
  h1 {
    font-size: 1.75rem; font-weight: 700; letter-spacing: -0.04em;
    margin-bottom: 0.35rem; line-height: 1.15;
  }
  .subtitle {
    font-size: 0.87rem; color: var(--mid); margin-bottom: 2rem; line-height: 1.5;
  }

  .form-error-banner {
    display: none;
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-radius: 7px;
    padding: 0.75rem 1rem;
    font-size: 0.84rem;
    color: var(--error);
    margin-bottom: 1.25rem;
  }
  .form-error-banner.visible { display: block; }

  .field { margin-bottom: 0.75rem; }
  .field label {
    display: block; font-size: 0.72rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--mid); margin-bottom: 0.35rem;
  }
  .field input {
    width: 100%; border: 1px solid var(--grey-border); border-radius: 7px;
    padding: 0.72rem 0.9rem; font-family: 'Inter', sans-serif;
    font-size: 0.87rem; background: var(--bg); color: var(--dark);
    outline: none; letter-spacing: -0.01em; transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--mauve); background: white; }
  .field input.input-error { border-color: var(--error-border); background: var(--error-bg); }

  button[type="submit"] {
    width: 100%; background: var(--dark); color: white; border: none;
    padding: 0.76rem; border-radius: 7px;
    font-family: 'Inter', sans-serif; font-size: 0.87rem; font-weight: 600;
    cursor: pointer; margin-top: 0.5rem; letter-spacing: -0.01em;
    transition: background 0.2s;
  }
  button[type="submit"]:hover { background: var(--mauve-deep); }
  button[type="submit"]:active { transform: scale(0.99); }
  button[type="submit"]:disabled { opacity: 0.55; cursor: not-allowed; }

  .portal-footer {
    margin-top: 1.5rem; font-size: 0.82rem; color: var(--mid); text-align: center;
    display: flex; flex-direction: column; gap: 0.4rem;
  }
  .portal-footer a { color: var(--mauve); text-decoration: none; font-weight: 500; }
  .portal-footer a:hover { color: var(--mauve-deep); }

  footer {
    padding: 2.25rem 6%; border-top: 1px solid var(--grey-border);
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 4rem;
  }
  .f-logo { font-size: 0.95rem; font-weight: 700; color: var(--dark); letter-spacing: -0.04em; }
  .f-logo span { color: var(--mauve); }
  footer p { font-size: 0.76rem; color: var(--mid); }

  @media (max-width: 768px) {
    footer { flex-direction: column; gap: 0.75rem; text-align: center; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Re<span class="q">Q</span>uestHer</a>
  <a href="index.html" class="back-link">← Back to site</a>
</nav>

<div class="portal-wrap">
  <div class="portal-card">
    <div class="card-tag">Customer Portal</div>
    <h1>Welcome back.</h1>
    <p class="subtitle">Sign in to access your account and bookings.</p>

    <div class="form-error-banner" id="global-error"></div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password" />
      </div>
      <button type="submit" id="submit-btn">Sign In</button>
    </form>

    <div class="portal-footer">
      <span><a href="#">Forgot password?</a></span>
      // Add this to portal.html's <script> block
document.querySelector('a[href="#"]').addEventListener('click', async (e) => {
  e.preventDefault();
  const email = emailInput.value.trim();
  if (!email) { showError('Enter your email above first, then click Forgot Password.'); return; }

  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password.html'
  });

  if (!error) {
    globalError.style.background = '#f0eaf4';
    globalError.style.borderColor = '#9b7fa6';
    globalError.style.color = '#7a5f8a';
    globalError.textContent = 'Password reset email sent — check your inbox.';
    globalError.classList.add('visible');
  } else {
    showError(error.message);
  }
});
      <span>Don't have an account? <a href="signup.html">Create one</a></span>
    </div>
  </div>
</div>

<footer>
  <div class="f-logo">Re<span>Q</span>uestHer</div>
  <p>Launching in Chicago · 2025</p>
  <p>requesther.com</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://qqyiiytznfbfqotiscqx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxeWlpeXR6bmZiZnFvdGlzY3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODMyOTgsImV4cCI6MjA5MTY1OTI5OH0.8VZzqBVw5FWCuEIw0WfRuyyXc8LaM1x4OtNN3whQTFs';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('login-form');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const globalError = document.getElementById('global-error');

  function showError(message) {
    globalError.textContent = message;
    globalError.classList.add('visible');
    emailInput.classList.add('input-error');
    passwordInput.classList.add('input-error');
  }

  function clearError() {
    globalError.textContent = '';
    globalError.classList.remove('visible');
    emailInput.classList.remove('input-error');
    passwordInput.classList.remove('input-error');
  }

  emailInput.addEventListener('input', clearError);
  passwordInput.addEventListener('input', clearError);

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    if (!email || !password) { showError('Please enter your email and password.'); return; }

    const btn = document.getElementById('submit-btn');
    btn.textContent = 'Signing in…';
    btn.disabled = true;

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      btn.textContent = 'Sign In';
      btn.disabled = false;
      if (error.message.toLowerCase().includes('invalid') || error.message.toLowerCase().includes('credentials')) {
        showError('Incorrect email or password. Please try again.');
      } else if (error.message.toLowerCase().includes('confirmed')) {
        showError('Please verify your email before signing in. Check your inbox.');
      } else {
        showError(error.message);
      }
      return;
    }

    window.location.href = 'profile-setup.html';
  });
</script>
</body>
</html>
