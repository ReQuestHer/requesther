<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuestHers Login — RequestHer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --mauve: #9b7fa6;
    --mauve-deep: #7a5f8a;
    --mauve-light: #f0eaf4;
    --mauve-subtle: #f7f3f9;
    --grey-border: #e5e7eb;
    --bg: #fafafa;
    --dark: #1f1f2e;
    --mid: #6b7280;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.1rem 6%;
    background: rgba(250,250,250,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--grey-border);
  }
  .logo { font-size: 1.2rem; font-weight: 700; color: var(--dark); letter-spacing: -0.04em; text-decoration: none; }
  .logo .q { color: var(--mauve); }
  .back-link { font-size: 0.84rem; color: var(--mid); text-decoration: none; letter-spacing: -0.01em; transition: color 0.2s; }
  .back-link:hover { color: var(--dark); }

  .portal-wrap {
    max-width: 420px;
    margin: 5rem auto 3rem;
    padding: 0 1.5rem;
  }

  .portal-card {
    background: white; border: 1px solid var(--grey-border);
    border-radius: 12px; padding: 2.5rem; text-align: center;
  }

  .card-tag {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--mauve); margin-bottom: 0.6rem;
  }
  h1 {
    font-size: 1.75rem; font-weight: 700; letter-spacing: -0.04em;
    margin-bottom: 0.35rem; line-height: 1.15;
  }
  .subtitle {
    font-size: 0.87rem; color: var(--mid); margin-bottom: 2rem; line-height: 1.5;
  }

  .fields { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1rem; }
  .fields input {
    width: 100%; border: 1px solid var(--grey-border); border-radius: 7px;
    padding: 0.72rem 0.9rem; font-family: 'Inter', sans-serif;
    font-size: 0.87rem; background: var(--bg); color: var(--dark);
    outline: none; letter-spacing: -0.01em; transition: border-color 0.2s;
    text-align: left;
  }
  .fields input:focus { border-color: var(--mauve); background: white; }
  .fields input::placeholder { color: #b0b5be; }

  .btn-primary {
    width: 100%; background: var(--dark); color: white; border: none;
    padding: 0.76rem; border-radius: 7px;
    font-family: 'Inter', sans-serif; font-size: 0.87rem; font-weight: 600;
    cursor: pointer; letter-spacing: -0.01em; transition: background 0.2s;
    margin-bottom: 0.6rem;
  }
  .btn-primary:hover { background: var(--mauve-deep); }

  .btn-secondary {
    width: 100%; background: transparent; color: var(--dark);
    border: 1px solid var(--grey-border); padding: 0.76rem; border-radius: 7px;
    font-family: 'Inter', sans-serif; font-size: 0.87rem; font-weight: 500;
    cursor: pointer; letter-spacing: -0.01em; transition: border-color 0.2s, color 0.2s;
  }
  .btn-secondary:hover { border-color: var(--mauve); color: var(--mauve-deep); }

  .card-footer {
    margin-top: 1.5rem; font-size: 0.82rem; color: var(--mid);
  }
  .card-footer a { color: var(--mauve); text-decoration: none; font-weight: 500; }
  .card-footer a:hover { color: var(--mauve-deep); }

  footer {
    padding: 2.25rem 6%; border-top: 1px solid var(--grey-border);
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 4rem;
  }
  .f-logo { font-size: 0.95rem; font-weight: 700; color: var(--dark); letter-spacing: -0.04em; }
  .f-logo span { color: var(--mauve); }
  footer p { font-size: 0.76rem; color: var(--mid); }

  @media (max-width: 768px) {
    footer { flex-direction: column; gap: 0.75rem; text-align: center; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Re<span class="q">Q</span>uestHer</a>
  <a href="index.html" class="back-link">← Back to site</a>
</nav>

<div class="portal-wrap">
  <div class="portal-card">
    <div class="card-tag">Provider Portal</div>
    <h1>QuestHers</h1>
    <p class="subtitle">A space for women providers on a journey of growth &amp; purpose.</p>

    <form>
      <div class="fields">
        <input type="email" placeholder="Email address" autocomplete="email" />
        <input type="password" placeholder="Password" autocomplete="current-password" />
      </div>
      <button class="btn-primary" type="submit">Log In</button>
    </form>

    <button class="btn-secondary" onclick="window.location.href='signup.html'">Create an Account</button>

    <div class="card-footer">
      <p style="margin-top: 1rem;"><a href="#">Forgot password?</a></p>
    </div>
  </div>
</div>

<footer>
  <div class="f-logo">Re<span>Q</span>uestHer</div>
  <p>Launching in Chicago · 2025</p>
  <p>requesther.com</p>
</footer>

</body>
</html>
